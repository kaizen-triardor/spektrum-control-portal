<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spektrum Control — Platforma za upravljanje protivpožarnim kontrolama</title>
  <meta name="description" content="Spektrum Control je platforma za upravljanje protivpožarnim kontrolama, periodičnim ispravama i radnim nalozima. MBS Spektrum d.o.o. — Sremska Mitrovica." />
  <meta name="theme-color" content="#1E3A5F" />

  <!-- OpenGraph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://spektrumcontrol.rs/" />
  <meta property="og:title" content="Spektrum Control" />
  <meta property="og:description" content="Platforma za upravljanje protivpožarnim kontrolama." />
  <meta property="og:image" content="https://spektrumcontrol.rs/assets/og-image.png" />
  <meta property="og:locale" content="sr_RS" />
  <meta property="og:site_name" content="Spektrum Control" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Spektrum Control" />
  <meta name="twitter:description" content="Platforma za upravljanje protivpožarnim kontrolama." />
  <meta name="twitter:image" content="https://spektrumcontrol.rs/assets/og-image.png" />

  <!-- Canonical + alternate locales -->
  <link rel="canonical" href="https://spektrumcontrol.rs/" />
  <link rel="alternate" hreflang="sr-Latn" href="https://spektrumcontrol.rs/" />
  <link rel="alternate" hreflang="sr-Cyrl" href="https://spektrumcontrol.rs/?lang=sr-Cyrl" />
  <link rel="alternate" hreflang="en" href="https://spektrumcontrol.rs/?lang=en" />
  <link rel="alternate" hreflang="ro" href="https://spektrumcontrol.rs/?lang=ro" />
  <link rel="alternate" hreflang="x-default" href="https://spektrumcontrol.rs/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />

  <!-- Theme bootstrap (avoid flash) -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem('spektrum-control-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = stored || (prefersDark ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      } catch (e) { /* localStorage may be blocked */ }
    })()
  </script>
</head>
<body>
  <header class="topbar" role="banner">
    <button id="theme-toggle" class="topbar-btn" aria-label="Promeni temu" type="button">
      <span class="theme-icon-light" aria-hidden="true">☀</span>
      <span class="theme-icon-dark" aria-hidden="true">🌙</span>
    </button>
    <select id="locale-toggle" class="locale-select" aria-label="Promeni jezik">
      <option value="sr-Latn">SR · Latn</option>
      <option value="sr-Cyrl">СР · Ћирилица</option>
      <option value="en">EN</option>
      <option value="ro">RO</option>
    </select>
  </header>

  <main class="hero" role="main">
    <div class="hero-inner">
      <img src="/assets/logo.svg" alt="" class="hero-logo" width="80" height="80" />

      <h1 class="hero-title">SPEKTRUM CONTROL</h1>
      <p class="hero-pitch" data-i18n="pitch">Platforma za upravljanje protivpožarnim kontrolama</p>

      <div class="cta-row">
        <a class="cta cta-primary" href="https://app.spektrumcontrol.rs">
          <span class="cta-icon" aria-hidden="true">🖥</span>
          <span class="cta-content">
            <span class="cta-label" data-i18n="openAdmin">Admin dashboard</span>
            <span class="cta-host">app.spektrumcontrol.rs</span>
          </span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>

        <a class="cta cta-secondary" href="https://field.spektrumcontrol.rs">
          <span class="cta-icon" aria-hidden="true">📱</span>
          <span class="cta-content">
            <span class="cta-label" data-i18n="openMobile">Mobilna aplikacija</span>
            <span class="cta-host">field.spektrumcontrol.rs</span>
          </span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>
      </div>

      <nav class="legal-row" aria-label="Pravne stranice">
        <a href="https://app.spektrumcontrol.rs/legal/terms" data-i18n="terms">Uslovi korišćenja</a>
        <span aria-hidden="true">·</span>
        <a href="https://app.spektrumcontrol.rs/legal/privacy" data-i18n="privacy">Politika privatnosti</a>
      </nav>

      <a class="cta-tertiary" href="https://mbs-spektrum.com/kontakt.html" data-i18n="requestDemo">
        Zatražite demo →
      </a>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer-inner">
      <span data-i18n="ownerLine">Vlasnik · MBS Spektrum d.o.o.</span>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a href="https://mbs-spektrum.com">mbs-spektrum.com</a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <span data-i18n="footerLocation">Sremska Mitrovica, 1992</span>
    </div>
  </footer>

  <script src="/script.js" defer></script>
</body>
</html>
